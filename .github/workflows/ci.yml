name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run generate
      - run: npm run generate:events
      # Generated files must match what's committed — catches a stale
      # types.gen.ts / events.gen.ts after a contract sync.
      - run: git diff --exit-code src/api/types.gen.ts src/realtime/events.gen.ts
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
